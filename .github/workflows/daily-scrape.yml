name: Daily scrape

on:
  schedule:
    - cron: "0 11 * * *" # Runs every day at 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python dbchs_scraper_with_json.py

      - name: Commit and push after successful scrape
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f dbchs_final_current.json

          if git diff --cached --quiet; then
            echo "Scraper ran successfully, but Git detected no content changes."
            git commit --allow-empty -m "chore: daily scrape ran successfully $(date -u +'%Y-%m-%d %H:%M UTC')"
          else
            echo "Scraper ran successfully and file changed."
            git commit -m "chore: update daily scrape data $(date -u +'%Y-%m-%d %H:%M UTC')"
          fi

          git push
